# -- Colors & Terminal --
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
# Undercurl support (Neovim)
set -ga terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -ga terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# -- General --
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on

# -- Key Bindings --
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

# Splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Copy Mode --
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# -- Status Bar --
set -g status-position bottom
set -g status-style "bg=#111111,fg=#555555"
set -g status-left ""
set -g status-right "#[fg=#444444] %H:%M "
set -g status-right-length 20

set -g window-status-format         "#[fg=#444444] #I:#W "
set -g window-status-current-format "#[fg=#cccccc,bold] #I:#W "
set -g window-status-separator ""

set -g pane-border-style        "fg=#2a2a2a"
set -g pane-active-border-style "fg=#444444"
set -g message-style            "bg=#111111,fg=#cccccc"
